---
edpm_accel_drivers:
  cache_dir: "/var/cache/accel-drivers"
  cleanup_temp_files: true
  download:
    delay: "{{ edpm_download_delay | default(60) }}"
    retries: "{{ edpm_download_retries | default(5) }}"
  vendors:
    nvidia_gpu:
      enabled: false
      denylist_modules:
        - nouveau
      repo:
        url: ""
        gpgkey: ""
        module_name: "nvidia-driver"
        module_stream: "latest"
        package_name: "nvidia-driver"
        disable_gpg_check: false
      custom_url:
        url: ""
        ssl_no_verify: false
        disable_gpg_check: false
    amd_gpu:
      enabled: false
      denylist_modules:
        - amdgpu
      custom_url:
        url: ""
        ssl_no_verify: false
        disable_gpg_check: false
  features:
    nvidia_mig:
      manage: false
      geometries: []
