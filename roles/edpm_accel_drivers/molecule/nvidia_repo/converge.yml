---
- name: Converge
  hosts: all
  roles:
    - role: "edpm_accel_drivers"
      vars:
        edpm_accel_drivers:
          vendors:
            nvidia_gpu:
              enabled: true
              repo:
                url: "https://developer.download.nvidia.com/compute/cuda/repos/rhel9/"
                gpgkey: "https://developer.download.nvidia.com/compute/cuda/repos/rhel9/$basearch/D42D0685.pub"
                module_stream: "open-dkms"
                package_name: "nvidia-open"
